# docker-compose.yml — Producción / sandbox real
#
# - DB: Supabase (o cualquier Postgres externo) vía DATABASE_URL del .env
# - PVS: sandbox/prod real (NO mockpvs)
# - GS: real (key-md5)
#
# Requisitos:
#   1. Copiar .env.example → .env y completar las 7 vars obligatorias
#   2. DATABASE_URL de Supabase con sslmode=require
#
# Uso:
#   docker compose --profile migrations run --rm migrations   # migrar una vez
#   docker compose up -d --build                              # levantar bridge
#   docker compose logs -f bridge
#   curl http://localhost:8080/healthz
#
# Variables: Compose lee .env para interpolación (${DATABASE_URL}) y el
# servicio bridge también carga env_file. NO hardcodear secretos acá.

services:
  # --- Migraciones (one-shot, profile) ---
  # Aplica ./migrations contra DATABASE_URL (Supabase).
  # No depende de un Postgres local.
  migrations:
    image: migrate/migrate:v4.17.0
    container_name: powermix_migrations
    profiles:
      - migrations
    volumes:
      - ./migrations:/migrations:ro
    # ${DATABASE_URL} se toma del archivo .env del host (Compose interpolation).
    # Preferir Session/Direct de Supabase; evitar pooler transaction (6543).
    command:
      - -path=/migrations
      - -database=${DATABASE_URL}
      - up

  # --- Bridge (app) ---
  bridge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: powermix_bridge
    command: ["./vps-powermix"]
    ports:
      - "8080:8080"
    env_file:
      - .env
    # Defaults operativos. Secretos/URLs vienen del .env (no se pisan).
    environment:
      HTTP_ADDR: ":8080"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      # Feature flags / workers — se pueden sobreescribir en .env
      GS_PVS_ENABLED: ${GS_PVS_ENABLED:-true}
      RECONCILER_ENABLED: ${RECONCILER_ENABLED:-true}
      RECONCILER_INTERVAL_SEC: ${RECONCILER_INTERVAL_SEC:-60}
      RECONCILER_BATCH_SIZE: ${RECONCILER_BATCH_SIZE:-200}
    healthcheck:
      test:
        - CMD
        - wget
        - -q
        - -O
        - /dev/null
        - http://localhost:8080/healthz
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
