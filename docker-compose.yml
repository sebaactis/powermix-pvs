version: '3.8'

services:
  # Base de datos relacional para guardar las ordenes, conciliaciones y logs
  postgres:
    image: postgres:15-alpine
    container_name: powermix_db
    environment:
      POSTGRES_DB: vps_powermix
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vps_powermix"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Contenedor efimero para correr las migraciones SQLX de forma automatica
  migrations:
    image: migrate/migrate:v4.17.0
    container_name: powermix_migrations
    volumes:
      - ./migrations:/migrations
    command:
      - -path=/migrations
      - -database=postgres://postgres:postgres@postgres:5432/vps_powermix?sslmode=disable
      - up
    depends_on:
      postgres:
        condition: service_healthy

  # Mock de PVS para simular respuestas de QR, tokens y reversos localmente
  mockpvs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: powermix_mockpvs
    command: ["./mockpvs"]
    ports:
      - "8081:8081"

  # El servicio principal del Bridge
  bridge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: powermix_bridge
    command: ["./vps-powermix"]
    ports:
      - "8080:8080"
    environment:
      - HTTP_ADDR=:8080
      - LOG_LEVEL=debug
      - LOG_FORMAT=json
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/vps_powermix?sslmode=disable
      # URLs y credenciales configuradas para apuntar a la red interna de Docker
      - GS_BASE_URL=http://localhost:8082
      - GS_KEY=gs_mock_key
      - GS_SECRET=gs_mock_secret
      - GS_PVS_ENABLED=true
      - PVS_BASE_URL=http://mockpvs:8081
      - PVS_CLIENT_ID=pvs_mock_client
      - PVS_CLIENT_SECRET=pvs_mock_secret
      - PVS_CALLBACK_URL=http://bridge:8080/webhook/pvs
      - RECONCILER_ENABLED=true
      - RECONCILER_INTERVAL_SEC=10
      - RECONCILER_BATCH_SIZE=200
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
      mockpvs:
        condition: service_started

volumes:
  pgdata:
