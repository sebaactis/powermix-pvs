# docker-compose.yml — Producción / Sandbox real
# Apunta a PVS sandbox real (api01.pvssa.com.ar).
# No incluye mockpvs.
#
# Uso: docker compose up -d
# Variables sensibles: crear .env con PVS_CLIENT_ID, PVS_CLIENT_SECRET, etc.

volumes:
  pgdata:

services:
  postgres:
    image: postgres:15-alpine
    container_name: powermix_db
    environment:
      POSTGRES_DB: vps_powermix
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vps_powermix"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrations:
    image: migrate/migrate:v4.17.0
    container_name: powermix_migrations
    profiles:
      - migrations
    volumes:
      - ./migrations:/migrations
    command:
      - -path=/migrations
      - -database=postgres://postgres:postgres@postgres:5432/vps_powermix?sslmode=disable
      - up
    depends_on:
      postgres:
        condition: service_healthy

  bridge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: powermix_bridge
    command: ["./vps-powermix"]
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - HTTP_ADDR=:8080
      - LOG_LEVEL=info
      - LOG_FORMAT=json
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/vps_powermix?sslmode=disable
      - RECONCILER_ENABLED=true
      - RECONCILER_INTERVAL_SEC=30
      - RECONCILER_BATCH_SIZE=200
    depends_on:
      postgres:
        condition: service_healthy
